<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDex App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>PokeDex App</h1>
    <div id="searchSection">
        <input id="searchBar" type="text" placeholder="Enter Pokémon name...">
        <button id="searchBtn">Search!</button>
        <p id="error" class="error"></p>
        <button id="randomBtn">Generate Random Pokemon!</button>
    </div>
    <div id="pokemonContainer">

        <div id="pokemonInfo">

            <p>Name: <span id="name"></span></p>
            <p>Height: <span id="height"></span>M</p>
            <p>Weight: <span id="weight"></span>KG</p>
            <p>Type: <span id="type"></span></p>
            <p>Abilities: <span id="abilities"></span></p>

            <div id="stats"></div>

        </div>

        <img id="pokemonImage">

    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
